<!doctype html>
<html>
  <head>
    <title>CRUD App</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="container mt-5">
      <h1 class="text-center text-primary mb-4">Student CRUD Application</h1>

      <a href="{% url 'crudapp:add' %}" class="btn btn-success mb-3">
        Add Student
      </a>

      <table class="table table-bordered table-striped bg-white">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for student in students %}
          <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>

            <td>
              <a
                href="{% url 'crudapp:edit' student.id %}"
                class="btn btn-warning btn-sm"
              >
                Edit
              </a>

              <a
                href="{% url 'crudapp:delete' student.id %}"
                class="btn btn-danger btn-sm"
              >
                Delete
              </a>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="4" class="text-center">No students found.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
