<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA – AI Voice Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00f5ff;
      --purple: #8b00ff;
      --pink:   #ff006e;
      --dark:   #020010;
      --card:   rgba(0,245,255,0.04);
      --border: rgba(0,245,255,0.15);
      --glow:   0 0 20px rgba(0,245,255,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: #e0e0ff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;          /* we use a custom cursor */
    }

    /* ===== CUSTOM CURSOR ===== */
    #cursor-dot {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 10px; height: 10px;
      background: var(--cyan);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width .1s, height .1s, background .2s;
      box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
    }
    #cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 9998;
      width: 36px; height: 36px;
      border: 2px solid rgba(0,245,255,0.6);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform .12s ease, width .2s, height .2s, border-color .2s;
    }
    body.clicking #cursor-dot { width: 16px; height: 16px; background: var(--pink); }
    body.clicking #cursor-ring { width: 50px; height: 50px; border-color: var(--pink); }

    /* ===== CANVAS PARTICLE BG ===== */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== LAYOUT ===== */
    .wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      padding: 30px 20px 60px;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown .8s ease both;
    }
    header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 6px;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(0,245,255,0.5));
    }
    header p {
      margin-top: 8px;
      font-size: 1rem;
      letter-spacing: 3px;
      color: rgba(0,245,255,0.6);
      text-transform: uppercase;
    }

    /* ===== ORBS / AVATAR ===== */
    .avatar-container {
      position: relative;
      width: 200px; height: 200px;
      margin-bottom: 40px;
    }
    .orb {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      animation: spin 6s linear infinite;
    }
    .orb-1 { border-top-color: var(--cyan);   border-right-color: var(--cyan);   }
    .orb-2 { inset: 16px; border-bottom-color: var(--purple); border-left-color: var(--purple); animation-duration: 4s; animation-direction: reverse; }
    .orb-3 { inset: 32px; border-top-color: var(--pink);   border-right-color: var(--pink);   animation-duration: 3s; }
    .orb-core {
      position: absolute; inset: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a005a, #020010);
      box-shadow: 0 0 40px rgba(0,245,255,0.4), 0 0 80px rgba(139,0,255,0.3), inset 0 0 30px rgba(0,245,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .orb-core.listening {
      box-shadow: 0 0 60px rgba(0,245,255,0.9), 0 0 120px rgba(0,245,255,0.4), inset 0 0 30px rgba(0,245,255,0.2);
      animation: pulse-glow 1s ease-in-out infinite;
    }
    .orb-core.speaking {
      box-shadow: 0 0 60px rgba(255,0,110,.9), 0 0 120px rgba(255,0,110,.4), inset 0 0 30px rgba(255,0,110,.2);
      animation: pulse-glow-pink 1s ease-in-out infinite;
    }

    /* ===== STATUS TEXT ===== */
    .status {
      font-family: 'Orbitron', monospace;
      font-size: .75rem;
      letter-spacing: 4px;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 30px;
      min-height: 20px;
      transition: color .3s;
    }
    .status.listening { color: var(--cyan); }
    .status.speaking  { color: var(--pink); }

    /* ===== WAVE BARS ===== */
    .wave-bars {
      display: flex; gap: 4px; align-items: flex-end;
      height: 40px; margin-bottom: 30px;
      opacity: 0; transition: opacity .4s;
    }
    .wave-bars.active { opacity: 1; }
    .wave-bars span {
      display: block; width: 5px;
      border-radius: 3px;
      background: linear-gradient(to top, var(--purple), var(--cyan));
      animation: wave 0.6s ease-in-out infinite alternate;
    }
    .wave-bars span:nth-child(1)  { height: 20px; animation-delay: 0s;    }
    .wave-bars span:nth-child(2)  { height: 35px; animation-delay: 0.08s; }
    .wave-bars span:nth-child(3)  { height: 28px; animation-delay: 0.16s; }
    .wave-bars span:nth-child(4)  { height: 40px; animation-delay: 0.24s; }
    .wave-bars span:nth-child(5)  { height: 22px; animation-delay: 0.32s; }
    .wave-bars span:nth-child(6)  { height: 38px; animation-delay: 0.40s; }
    .wave-bars span:nth-child(7)  { height: 18px; animation-delay: 0.48s; }
    .wave-bars span:nth-child(8)  { height: 30px; animation-delay: 0.56s; }
    .wave-bars span:nth-child(9)  { height: 25px; animation-delay: 0.64s; }
    .wave-bars span:nth-child(10) { height: 36px; animation-delay: 0.72s; }

    /* ===== CHAT AREA ===== */
    .chat-container {
      width: 100%; max-width: 720px;
      height: 340px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow-y: auto;
      padding: 20px;
      margin-bottom: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple) transparent;
      box-shadow: var(--glow), inset 0 0 40px rgba(0,0,0,.4);
      backdrop-filter: blur(8px);
    }
    .chat-container::-webkit-scrollbar { width: 5px; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

    .bubble {
      display: flex; gap: 10px;
      margin-bottom: 16px;
      animation: bubbleIn .4s cubic-bezier(.175,.885,.32,1.275) both;
    }
    .bubble.user  { flex-direction: row-reverse; }

    .avatar-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .bubble.user  .avatar-icon { background: linear-gradient(135deg, var(--purple), var(--pink)); }
    .bubble.ai    .avatar-icon { background: linear-gradient(135deg, var(--cyan), var(--purple)); }

    .bubble-text {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: .95rem;
      line-height: 1.5;
    }
    .bubble.user .bubble-text {
      background: linear-gradient(135deg, rgba(139,0,255,.25), rgba(255,0,110,.15));
      border: 1px solid rgba(139,0,255,.4);
      border-top-right-radius: 4px;
    }
    .bubble.ai .bubble-text {
      background: linear-gradient(135deg, rgba(0,245,255,.08), rgba(139,0,255,.1));
      border: 1px solid rgba(0,245,255,.25);
      border-top-left-radius: 4px;
    }

    /* typing indicator */
    .typing-dots span {
      display: inline-block; width: 7px; height: 7px;
      background: var(--cyan); border-radius: 50%; margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }

    /* ===== INPUT ROW ===== */
    .input-row {
      display: flex; gap: 12px; align-items: center;
      width: 100%; max-width: 720px;
    }
    .text-input {
      flex: 1;
      background: rgba(0,245,255,0.04);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 14px 22px;
      color: #e0e0ff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .3s, box-shadow .3s;
    }
    .text-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,245,255,.15), var(--glow);
    }
    .text-input::placeholder { color: rgba(0,245,255,.35); }

    .btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: none; cursor: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      transition: transform .2s, box-shadow .2s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,.25), transparent 70%);
      opacity: 0; transition: opacity .3s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:hover { transform: scale(1.1); }
    .btn:active { transform: scale(.95); }

    .btn-mic {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      box-shadow: 0 0 20px rgba(0,245,255,.4);
    }
    .btn-mic.recording {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 0 30px rgba(255,0,110,.7);
      animation: pulse-btn 1s ease infinite;
    }
    .btn-send {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      box-shadow: 0 0 20px rgba(139,0,255,.4);
    }
    .btn-clear {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      font-size: .9rem;
    }
    .btn-clear:hover { border-color: var(--pink); box-shadow: 0 0 10px rgba(255,0,110,.3); }

    /* ===== HISTORY PANEL ===== */
    .history-toggle {
      margin-top: 30px;
      background: none; border: 1px solid var(--border);
      border-radius: 50px; padding: 8px 24px;
      color: rgba(0,245,255,.7);
      font-family: 'Orbitron', monospace;
      font-size: .65rem; letter-spacing: 3px;
      cursor: none;
      transition: all .3s;
    }
    .history-toggle:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: var(--glow); }

    .history-panel {
      width: 100%; max-width: 720px;
      margin-top: 16px;
      max-height: 0; overflow: hidden;
      transition: max-height .6s cubic-bezier(.4,0,.2,1);
    }
    .history-panel.open { max-height: 600px; overflow-y: auto; }

    .history-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 10px;
      animation: fadeUp .4s ease both;
    }
    .history-item .q { color: var(--cyan); font-size: .85rem; margin-bottom: 4px; }
    .history-item .a { color: rgba(255,255,255,.75); font-size: .85rem; }
    .history-item .ts { color: rgba(255,255,255,.3); font-size: .72rem; margin-top: 6px; }

    /* ===== KEYFRAMES ===== */
    @keyframes spin       { to { transform: rotate(360deg); } }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(0,245,255,.4), 0 0 80px rgba(139,0,255,.3); }
      50%       { box-shadow: 0 0 80px rgba(0,245,255,.9), 0 0 160px rgba(139,0,255,.6); }
    }
    @keyframes pulse-glow-pink {
      0%, 100% { box-shadow: 0 0 40px rgba(255,0,110,.4), 0 0 80px rgba(139,0,255,.3); }
      50%       { box-shadow: 0 0 80px rgba(255,0,110,.9), 0 0 160px rgba(139,0,255,.6); }
    }
    @keyframes pulse-btn {
      0%, 100% { transform: scale(1);    box-shadow: 0 0 20px rgba(255,0,110,.5); }
      50%       { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,0,110,.9); }
    }
    @keyframes wave {
      from { transform: scaleY(1); }
      to   { transform: scaleY(0.3); }
    }
    @keyframes blink {
      0%,100% { opacity: .2; transform: translateY(0);   }
      50%      { opacity: 1;  transform: translateY(-4px); }
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(12px) scale(.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0);     }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes sparkle {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ===== MOUSE TRAIL SPARKS ===== */
    .spark {
      position: fixed; z-index: 9997;
      width: 6px; height: 6px; border-radius: 50%;
      pointer-events: none;
      animation: sparkle .6s ease forwards;
    }

    /* ===== TOOLTIP ===== */
    [data-tip] { position: relative; }
    [data-tip]::before {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.8); color: var(--cyan);
      font-size: .65rem; letter-spacing: 2px;
      padding: 4px 10px; border-radius: 6px;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity .2s;
      border: 1px solid var(--border);
    }
    [data-tip]:hover::before { opacity: 1; }

    /* mobile */
    @media (max-width: 500px) {
      .chat-container { height: 260px; }
      .btn { width: 44px; height: 44px; font-size: 1.1rem; }
    }
  </style>
</head>

<body>
  <!-- Custom cursor -->
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <!-- Particle canvas -->
  <canvas id="bg-canvas"></canvas>

  <div class="wrapper">

    <!-- Header -->
    <header>
      <h1>A R I A</h1>
      <p>Artificial Responsive Intelligent Assistant</p>
    </header>

    <!-- Rotating orb avatar -->
    <div class="avatar-container">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="orb-core" id="orb-core">🤖</div>
    </div>

    <!-- Status -->
    <div class="status" id="status-text">READY</div>

    <!-- Wave bars -->
    <div class="wave-bars" id="wave-bars">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Chat messages -->
    <div class="chat-container" id="chat-box">
      <!-- initial greeting bubble -->
      <div class="bubble ai">
        <div class="avatar-icon">🤖</div>
        <div class="bubble-text">
          Hey! I'm <strong>ARIA</strong> – your AI voice assistant. 👋<br>
          Click the 🎤 mic to speak, or type a message below!
        </div>
      </div>
    </div>

    <!-- Input row -->
    <div class="input-row">
      <button class="btn btn-clear" id="btn-clear" data-tip="CLEAR CHAT">🗑️</button>
      <input  class="text-input" id="text-input" type="text" placeholder="Type a message or press the mic…" />
      <button class="btn btn-send" id="btn-send" data-tip="SEND">➤</button>
      <button class="btn btn-mic"  id="btn-mic"  data-tip="SPEAK">🎤</button>
    </div>

    <!-- History -->
    <button class="history-toggle" id="history-toggle">📂 CONVERSATION HISTORY</button>
    <div class="history-panel" id="history-panel">
      {% for h in history %}
      <div class="history-item">
        <div class="q">🧑 {{ h.user_message }}</div>
        <div class="a">🤖 {{ h.ai_response }}</div>
        <div class="ts">{{ h.timestamp }}</div>
      </div>
      {% empty %}
      <div class="history-item"><div class="a">No history yet.</div></div>
      {% endfor %}
    </div>

  </div><!-- /wrapper -->

<script>
/* ================================================================
   PARTICLE BACKGROUND
   ================================================================ */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function mkParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      alpha: Math.random() * 0.5 + 0.1,
    };
  }

  for (let i = 0; i < 130; i++) particles.push(mkParticle());

  let mouseX = -1000, mouseY = -1000;
  window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // draw connections near mouse
    particles.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;

      const dx = p.x - mouseX, dy = p.y - mouseY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(mouseX, mouseY);
        ctx.strokeStyle = `rgba(0,245,255,${0.2 * (1 - dist/120)})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // particle dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,245,255,${p.alpha})`;
      ctx.fill();

      // connect nearby particles
      for (let j = i+1; j < particles.length; j++) {
        const q = particles[j];
        const ddx = p.x - q.x, ddy = p.y - q.y;
        const d   = Math.sqrt(ddx*ddx + ddy*ddy);
        if (d < 90) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `rgba(139,0,255,${0.1*(1-d/90)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ================================================================
   CUSTOM CURSOR + MOUSE TRAIL SPARKS
   ================================================================ */
const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let ringX = 0, ringY = 0;

document.addEventListener('mousemove', e => {
  const {clientX: x, clientY: y} = e;
  dot.style.left  = x + 'px';
  dot.style.top   = y + 'px';

  // ring lags behind
  ringX += (x - ringX) * 0.12;
  ringY += (y - ringY) * 0.12;

  // mouse-move lighting on buttons
  document.querySelectorAll('.btn').forEach(btn => {
    const r   = btn.getBoundingClientRect();
    const mx  = ((x - r.left) / r.width  * 100).toFixed(1);
    const my  = ((y - r.top)  / r.height * 100).toFixed(1);
    btn.style.setProperty('--mx', mx + '%');
    btn.style.setProperty('--my', my + '%');
  });

  // spawn spark
  if (Math.random() < 0.25) spawnSpark(x, y);
});

requestAnimationFrame(function loop() {
  ring.style.left = ringX + 'px';
  ring.style.top  = ringY + 'px';
  requestAnimationFrame(loop);
});

document.addEventListener('mousedown', () => document.body.classList.add('clicking'));
document.addEventListener('mouseup',   () => document.body.classList.remove('clicking'));

const SPARK_COLORS = ['#00f5ff','#8b00ff','#ff006e','#ffffff'];
function spawnSpark(x, y) {
  const s = document.createElement('div');
  s.className = 'spark';
  const dx = (Math.random()-0.5)*60, dy = (Math.random()-0.5)*60;
  s.style.cssText = `left:${x}px;top:${y}px;background:${SPARK_COLORS[Math.random()*SPARK_COLORS.length|0]};--dx:${dx}px;--dy:${dy}px;`;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 650);
}

/* ================================================================
   CHAT ENGINE
   ================================================================ */
const chatBox   = document.getElementById('chat-box');
const textInput = document.getElementById('text-input');
const btnSend   = document.getElementById('btn-send');
const btnMic    = document.getElementById('btn-mic');
const btnClear  = document.getElementById('btn-clear');
const orbCore   = document.getElementById('orb-core');
const statusTxt = document.getElementById('status-text');
const waveBars  = document.getElementById('wave-bars');

function setStatus(mode, text) {
  statusTxt.className = 'status ' + mode;
  statusTxt.textContent = text;
  orbCore.className = 'orb-core ' + mode;
  waveBars.classList.toggle('active', mode === 'listening' || mode === 'speaking');
}

function addBubble(who, text) {
  const wrap = document.createElement('div');
  wrap.className = `bubble ${who}`;
  wrap.innerHTML = `
    <div class="avatar-icon">${who === 'user' ? '🧑' : '🤖'}</div>
    <div class="bubble-text">${text}</div>`;
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'bubble ai typing';
  wrap.innerHTML = `<div class="avatar-icon">🤖</div>
    <div class="bubble-text"><span class="typing-dots"><span></span><span></span><span></span></span></div>`;
  chatBox.appendChild(wrap);
  chatBox.scrollTop = chatBox.scrollHeight;
  return wrap;
}

async function sendMessage(msg) {
  if (!msg.trim()) return;
  addBubble('user', escapeHtml(msg));
  textInput.value = '';
  setStatus('listening', 'THINKING…');

  const typingEl = addTyping();

  try {
    const res  = await fetch('/ai/chat/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
      body: JSON.stringify({message: msg}),
    });
    const data = await res.json();
    typingEl.remove();
    const reply = data.response || '🤖 Hmm, I had trouble with that.';
    addBubble('ai', escapeHtml(reply));
    setStatus('speaking', 'SPEAKING…');
    speak(reply);
  } catch(e) {
    typingEl.remove();
    addBubble('ai', '⚠️ Network error. Please check the server.');
    setStatus('', 'READY');
  }
}

function speak(text) {
  if (!('speechSynthesis' in window)) { setStatus('', 'READY'); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text.replace(/[^\w\s.,!?'"-]/g, ''));
  utt.rate = 0.95; utt.pitch = 1.05;
  // pick a nice voice if available
  const voices = window.speechSynthesis.getVoices();
  const pick = voices.find(v => /Google US English|Samantha|Microsoft Zira/i.test(v.name));
  if (pick) utt.voice = pick;
  utt.onend  = () => setStatus('', 'READY');
  utt.onerror = () => setStatus('', 'READY');
  window.speechSynthesis.speak(utt);
}

// load voices async
window.speechSynthesis && window.speechSynthesis.addEventListener('voiceschanged', () => {});

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function getCookie(name) {
  const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return v ? v.pop() : '';
}

btnSend.addEventListener('click', () => sendMessage(textInput.value));
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(textInput.value); });
btnClear.addEventListener('click', () => {
  chatBox.innerHTML = '';
  addBubble('ai', 'Chat cleared! Ask me anything. 😊');
  setStatus('', 'READY');
});

/* ================================================================
   SPEECH RECOGNITION
   ================================================================ */
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isRecording = false;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    btnMic.classList.add('recording');
    btnMic.textContent = '⏹';
    setStatus('listening', 'LISTENING…');
  };
  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    textInput.value  = transcript;
    sendMessage(transcript);
  };
  recognition.onerror = () => stopRec();
  recognition.onend   = () => stopRec();

  function stopRec() {
    isRecording = false;
    btnMic.classList.remove('recording');
    btnMic.textContent = '🎤';
    if (statusTxt.textContent === 'LISTENING…') setStatus('', 'READY');
  }

  btnMic.addEventListener('click', () => {
    if (isRecording) { recognition.stop(); }
    else             { recognition.start(); }
  });
} else {
  btnMic.title = 'Speech not supported in this browser';
  btnMic.style.opacity = '.4';
  btnMic.addEventListener('click', () =>
    addBubble('ai', '⚠️ Speech recognition is not supported in this browser. Use Chrome for best results!'));
}

/* ================================================================
   HISTORY TOGGLE
   ================================================================ */
document.getElementById('history-toggle').addEventListener('click', function() {
  const panel = document.getElementById('history-panel');
  panel.classList.toggle('open');
  this.textContent = panel.classList.contains('open') ? '🔼 HIDE HISTORY' : '📂 CONVERSATION HISTORY';
});
</script>
